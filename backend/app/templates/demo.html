<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EU Inbound Calculator — Live Demo</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-300: #cbd5e1;
      --slate-200: #e2e8f0;
      --slate-100: #f1f5f9;
      --slate-50:  #f8fafc;
      --accent:    #10b981; /* emerald-500 */
      --accent-dk: #059669; /* emerald-600 */
      --ink:       #0f172a;
      --muted:     #6b7280;
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; background: var(--slate-100); color: var(--ink); font-size: 14px;
    }

    /* Header */
    .topbar {
      background: var(--slate-900); color: #fff;
      padding: 14px 22px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #000;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .topbar .sub { font-size: 11px; color: var(--slate-300); margin-top: 2px; }
    .demo-pill {
      background: var(--accent); color: #052e1c;
      padding: 4px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .topbar-right { display: flex; gap: 10px; align-items: center; }
    .header-btn {
      background: rgba(255,255,255,0.08); color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 7px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .header-btn:hover { background: rgba(255,255,255,0.16); }

    /* App layout */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 56px);
    }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid #000; }
    }

    /* Sidebar */
    .sidebar {
      background: var(--slate-800); color: var(--slate-300);
      border-right: 1px solid #000;
      padding: 14px 0;
    }
    .sidebar-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #94a3b8;
      padding: 6px 18px 10px;
    }
    .scenario-item {
      display: block; width: 100%;
      background: transparent; color: var(--slate-300);
      border: none; border-left: 3px solid transparent;
      padding: 10px 16px 10px 15px;
      text-align: left; cursor: pointer;
      font-family: inherit; font-size: 13px; line-height: 1.35;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .scenario-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .scenario-item.active {
      background: var(--slate-900);
      border-left-color: var(--accent);
      color: #fff;
    }
    .scenario-item .label { font-weight: 600; display: block; }
    .scenario-item .desc { font-size: 11px; color: #94a3b8; margin-top: 3px; }
    .scenario-item.active .desc { color: var(--slate-300); }

    /* Detail pane */
    .detail {
      padding: 26px 32px 60px;
      overflow-y: auto;
    }
    @media (max-width: 700px) { .detail { padding: 18px 14px 40px; } }

    .summary-strip {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 18px;
    }
    .tag {
      background: #fff; border: 1px solid var(--slate-200);
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; color: var(--slate-700);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .tag strong { color: var(--ink); font-weight: 700; }
    .tag.ioss-yes { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
    .tag.ioss-no  { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .tag.b2b-yes  { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }

    /* Hero card */
    .hero {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 12px;
      padding: 26px 28px;
      box-shadow: 0 1px 2px rgba(15,23,42,0.04);
      margin-bottom: 16px;
    }
    .hero-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); font-weight: 600;
    }
    .hero-amount {
      font-size: 48px; font-weight: 700;
      color: var(--accent); line-height: 1.0;
      margin: 6px 0 4px;
      letter-spacing: -0.02em;
    }
    .hero-sub { font-size: 13px; color: var(--slate-700); }
    .hero-sub .pill {
      display: inline-block;
      background: var(--slate-100); color: var(--slate-700);
      padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
      margin-left: 6px;
    }

    /* Cost breakdown grid */
    .cost-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      margin-bottom: 18px;
    }
    @media (max-width: 800px) { .cost-grid { grid-template-columns: repeat(2, 1fr); } }
    .cost-card {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 10px; padding: 14px 16px;
    }
    .cost-card .lbl {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .cost-card .val {
      font-size: 22px; color: var(--ink); font-weight: 700; margin-top: 4px;
    }
    .cost-card .note { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Section card */
    .section {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 12px; padding: 18px 20px;
      margin-bottom: 16px;
    }
    .section h2 {
      font-size: 13px; margin: 0 0 12px;
      color: var(--slate-900); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* Line items table */
    table.lines { width: 100%; border-collapse: collapse; font-size: 12px; }
    table.lines th {
      text-align: left; font-weight: 600; color: var(--slate-700);
      background: var(--slate-50);
      padding: 8px 10px; border-bottom: 1px solid var(--slate-200);
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    table.lines td {
      padding: 10px; border-bottom: 1px solid var(--slate-100);
      color: var(--slate-700); vertical-align: top;
    }
    table.lines tr:last-child td { border-bottom: none; }
    table.lines td.num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; text-align: right; }
    table.lines th.num { text-align: right; }
    .regime-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
    }
    .regime-badge.e3 { background: #fee2e2; color: #991b1b; }
    .regime-badge.fta { background: #d1fae5; color: #065f46; }
    .regime-badge.std { background: #fef3c7; color: #92400e; }
    .regime-badge.no_duty { background: #e5e7eb; color: #4b5563; }

    /* Scenario header — context strip at top of detail pane */
    .scenario-header {
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdfa 100%);
      border: 1px solid #a7f3d0;
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
    }
    .scenario-header .sh-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--accent-dk); margin-bottom: 4px;
    }
    .scenario-header .sh-title {
      font-size: 17px; font-weight: 700; color: var(--slate-900); margin-bottom: 6px;
    }
    .scenario-header .sh-desc {
      font-size: 13px; color: var(--slate-700); line-height: 1.5;
    }

    /* Show your work — accordion */
    details.work {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 12px; padding: 0; margin-bottom: 16px; overflow: hidden;
    }
    details.work > summary {
      list-style: none; cursor: pointer;
      padding: 14px 20px;
      font-weight: 700; font-size: 13px;
      color: var(--slate-900);
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; justify-content: space-between;
    }
    details.work > summary::-webkit-details-marker { display: none; }
    details.work > summary::after {
      content: "▼"; font-size: 10px; color: var(--muted);
      transition: transform 0.15s;
    }
    details.work[open] > summary::after { transform: rotate(180deg); }
    details.work[open] > summary { border-bottom: 1px solid var(--slate-200); }
    details.work .work-body { padding: 14px 20px 18px; }

    /* Strategy analysis — categorised */
    .strategy-card {
      background: #fff; border: 1px solid var(--slate-200);
      border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
    }
    .strategy-card h2 {
      font-size: 13px; font-weight: 700; color: var(--slate-900);
      margin: 0 0 4px; letter-spacing: 0.01em;
    }
    .strategy-card-summary {
      display: flex; flex-wrap: wrap; gap: 8px;
      font-size: 11px; color: var(--slate-700);
      margin-bottom: 12px;
    }
    .strategy-summary-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      background: var(--slate-100); color: var(--slate-700);
      font-weight: 600; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .strategy-summary-chip.saves { background: #d1fae5; color: #065f46; }
    .strategy-summary-chip.worse { background: #fee2e2; color: #991b1b; }
    .strategy-summary-chip.na    { background: var(--slate-100); color: var(--slate-700); }
    .strategy-baseline {
      background: var(--slate-50); border: 1px solid var(--slate-200);
      border-radius: 6px; padding: 10px 14px; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    .strategy-baseline-label {
      font-size: 11px; color: var(--slate-700); font-weight: 600;
    }
    .strategy-baseline-value {
      font-size: 16px; font-weight: 700; color: var(--slate-900);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .strategy-bucket { margin-top: 14px; }
    .strategy-bucket:first-of-type { margin-top: 0; }
    .strategy-bucket h3 {
      font-size: 11px; font-weight: 700; color: var(--slate-900);
      margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 8px;
    }
    .strategy-bucket-meta {
      font-size: 10px; font-weight: 600; color: var(--muted);
      letter-spacing: 0.02em; text-transform: none;
    }
    .strategy-bucket-empty {
      font-size: 11px; color: var(--muted); font-style: italic;
      padding: 6px 0;
    }
    .strategy-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      column-gap: 12px; row-gap: 4px;
      align-items: start;
      padding: 10px 12px; margin-bottom: 6px;
      background: var(--slate-50); border: 1px solid var(--slate-200);
      border-left: 3px solid var(--slate-200);
      border-radius: 6px;
    }
    .strategy-row.saves { border-left-color: var(--accent); background: #ecfdf5; border-color: #a7f3d0; }
    .strategy-row.worse { border-left-color: #ef4444; background: #fef2f2; border-color: #fecaca; }
    .strategy-row.noop  { border-left-color: var(--slate-300); }
    .strategy-row.na    { border-left-color: var(--slate-300); opacity: 0.85; }
    .strategy-icon {
      grid-row: 1 / span 2;
      font-size: 16px; line-height: 1.2; padding-top: 1px;
      text-align: center;
    }
    .strategy-label {
      font-size: 13px; font-weight: 700; color: var(--slate-900);
      grid-column: 2;
    }
    .strategy-result {
      grid-column: 3; grid-row: 1;
      text-align: right;
      font-size: 13px; font-weight: 700;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      white-space: nowrap;
      color: var(--slate-900);
    }
    .strategy-result.na { color: var(--muted); font-style: italic; font-weight: 600; }
    .strategy-delta {
      font-size: 11px; font-weight: 600; margin-left: 6px;
    }
    .strategy-delta.saves { color: #047857; }
    .strategy-delta.worse { color: #b91c1c; }
    .strategy-delta.noop  { color: var(--muted); }
    .strategy-modified {
      grid-column: 2 / span 2;
      font-size: 11px; color: var(--slate-700); line-height: 1.4;
    }
    .strategy-modified .lbl { color: var(--muted); font-weight: 600; }
    .strategy-explain {
      grid-column: 2 / span 2;
      font-size: 11px; color: var(--slate-700); line-height: 1.45;
      margin-top: 2px;
    }
    .strategy-explain .lbl { color: var(--muted); font-weight: 600; }
    .strategy-explain.na .lbl { color: #92400e; }

    .step { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; font-size: 12px; line-height: 1.55; }
    .step.input { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .step.calc  { background: #f3f4f6; border-left: 3px solid #6b7280; }
    .step.result{ background: #d1fae5; border-left: 3px solid #10b981; }
    .step .label { font-weight: 700; color: var(--slate-900); }
    .step code { background: #e5e7eb; padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: 11px; }

    .work-body h3 {
      font-size: 11px; color: var(--slate-700);
      margin: 14px 0 6px; text-transform: uppercase;
      letter-spacing: 0.06em; font-weight: 700;
    }
    .item-breakdown {
      background: var(--slate-50); padding: 10px 12px;
      border-radius: 6px; margin-bottom: 8px; font-size: 12px;
      border: 1px solid var(--slate-200);
    }
    .item-breakdown .line-key { font-family: ui-monospace, monospace; font-size: 11px; color: var(--muted); }
    .default-item {
      background: #fffbeb; padding: 6px 8px; margin-bottom: 4px;
      border-left: 2px solid #f59e0b; font-size: 11px; border-radius: 2px;
    }
    .default-item .field { font-family: ui-monospace, monospace; color: #92400e; font-weight: 600; }
    .warning {
      background: #fef2f2; border-left: 3px solid #ef4444;
      padding: 7px 10px; font-size: 11px; margin-bottom: 6px;
      border-radius: 2px; color: #991b1b;
    }
    .ref-list { font-size: 11px; color: var(--slate-700); line-height: 1.55; padding-left: 18px; margin: 4px 0 0; }
    .ref-list li { margin-bottom: 3px; }
    .fee-status {
      background: #fff7ed; padding: 8px 10px;
      border-radius: 4px; margin-top: 8px; font-size: 11px;
      border-left: 3px solid #ea580c;
    }
    .fee-status .indicator { font-weight: 700; color: #ea580c; }

    .cite-link { color: #2563eb; text-decoration: none; border-bottom: 1px dotted #2563eb; font-size: 0.9em; }
    .cite-link:hover { border-bottom-style: solid; }

    /* Modal — reused from index */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9000; display: flex; align-items: flex-start; justify-content: center; overflow-y: auto; padding: 24px 16px; }
    .modal-content { background: #fff; border-radius: 10px; width: 100%; max-width: 860px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 24px 16px; border-bottom: 1px solid #e5e7eb; }
    .modal-header h2 { margin: 0; font-size: 18px; color: #111827; }
    .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #6b7280; padding: 4px 8px; border-radius: 4px; }
    .modal-close:hover { background: #f3f4f6; color: #111827; }
    .modal-body { padding: 20px 24px 28px; overflow-y: auto; max-height: calc(100vh - 130px); }
    .modal-section { margin-bottom: 28px; }
    .modal-section h3 { font-size: 14px; font-weight: 700; color: #1f2937; margin: 0 0 12px; padding-bottom: 6px; border-bottom: 1px solid #f3f4f6; }
    .regime-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .regime-card { padding: 12px; border-radius: 6px; border: 1px solid; }
    .regime-card.e3  { background: #fff1f2; border-color: #fecdd3; }
    .regime-card.std { background: #fffbeb; border-color: #fde68a; }
    .regime-card.fta { background: #f0fdf4; border-color: #bbf7d0; }
    .regime-card.b2b { background: #eff6ff; border-color: #bfdbfe; }
    .regime-card.postal { background: #faf5ff; border-color: #e9d5ff; }
    .regime-card .regime-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .regime-card .regime-desc { font-size: 11px; color: #4b5563; line-height: 1.4; }
    .regime-citation { font-size: 10px; color: #6b7280; margin-top: 6px; }
    .fees-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .fees-table th { background: #f3f4f6; padding: 8px 10px; text-align: left; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; }
    .fees-table td { padding: 7px 10px; border-bottom: 1px solid #f3f4f6; color: #374151; vertical-align: top; }
    .fees-table tr:last-child td { border-bottom: none; }
    .suspended-badge { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
    .active-badge { background: #d1fae5; color: #065f46; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
    .reference-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
    .reference-card { padding: 10px 12px; border: 1px solid #e5e7eb; border-radius: 6px; background: #f9fafb; }
    .reference-card .ref-short { font-size: 12px; font-weight: 600; color: #1e40af; margin-bottom: 3px; }
    .reference-card .ref-full { font-size: 10px; color: #4b5563; line-height: 1.4; margin-bottom: 6px; }
    .reference-card a { font-size: 10px; color: #2563eb; text-decoration: none; }
    .reference-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <div>
      <h1>EU Inbound Calculator — Live Demo</h1>
      <div class="sub">Council Reg. (EU) 2026/382 · Delegated Reg. C(2026)2760</div>
    </div>
    <span class="demo-pill">Demo</span>
  </div>
  <div class="topbar-right">
    <button class="header-btn" onclick="openExplainer()">How does this work?</button>
  </div>
</header>

<div class="app">

  <!-- LEFT: scenario list -->
  <aside class="sidebar">
    <div class="sidebar-title">Scenarios</div>
    <div id="scenario-list"></div>
  </aside>

  <!-- RIGHT: detail pane -->
  <main class="detail" id="detail">
    <div id="scenario-header" class="scenario-header"></div>
    <div id="summary-strip" class="summary-strip"></div>
    <div id="hero" class="hero"></div>
    <div id="cost-grid" class="cost-grid"></div>

    <div class="section">
      <h2>Line items</h2>
      <table class="lines" id="lines-table"></table>
    </div>

    <details class="work" open>
      <summary>Show your work</summary>
      <div class="work-body" id="work"></div>
    </details>

    <!-- Strategy analysis — categorised, explained card -->
    <div id="strategies" class="strategy-card"></div>
  </main>
</div>

<!-- EU Fees 101 Modal -->
<div id="explainer-overlay" class="modal-overlay" onclick="if(event.target===this)closeExplainer()" style="display:none">
  <div class="modal-content">
    <div class="modal-header">
      <h2>EU Customs Fees 101</h2>
      <button class="modal-close" onclick="closeExplainer()">×</button>
    </div>
    <div class="modal-body" id="explainer-body"></div>
  </div>
</div>

<script>
// ============================================================
// Citation registry — same as index.html
// ============================================================
const CITATIONS = {
  reg_2026_382: {
    short: 'Reg. (EU) 2026/382',
    full: 'Council Regulation (EU) 2026/382 of 11 February 2026 amending Regulation (EU) No 952/2013 (Union Customs Code) — new customs framework for low-value e-commerce',
    url: 'https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32026R0382',
  },
  da_c_2026_2760: {
    short: 'DA C(2026)2760',
    full: 'Commission Delegated Regulation C(2026)2760 of 30 April 2026 — €3 per-item simplified duty fee and conditions for the e-commerce simplified regime',
    url: 'https://taxation-customs.ec.europa.eu/customs/eu-customs-reform_en',
  },
  dir_2006_112: {
    short: 'VAT Directive 2006/112/EC',
    full: 'Council Directive 2006/112/EC of 28 November 2006 on the common system of value added tax',
    url: 'https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=celex%3A32006L0112',
  },
  ioss_dir_2017_2455: {
    short: 'IOSS Dir. 2017/2455/EU',
    full: 'Council Directive (EU) 2017/2455 of 5 December 2017 introducing the Import One-Stop Shop (IOSS) for distance sales of imported goods',
    url: 'https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32017L2455',
  },

function cite(key, anchorText) {
  const c = CITATIONS[key];
  if (!c) return anchorText || key;
  return `<a class="cite-link" href="${c.url}" target="_blank" rel="noopener" title="${c.full}">${anchorText || c.short}</a>`;
}

function openExplainer() {
  document.getElementById('explainer-body').innerHTML = buildExplainerHTML();
  populateReferenceGrid();
  document.getElementById('explainer-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeExplainer() {
  document.getElementById('explainer-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
function buildExplainerHTML() {
  let h = '';
  h += `<div class="modal-section">
    <h3>The Big Picture</h3>
    <p style="font-size:13px;line-height:1.7;color:#374151;margin:0">
      From <strong>1 July 2026</strong>, every low-value parcel (≤ €150) entering the EU pays a per-item
      customs fee under the new €3 simplified regime — ${cite('reg_2026_382')} + ${cite('da_c_2026_2760')}.
      The old €22 VAT exemption is gone. IOSS (Import One-Stop Shop) handles VAT collection for registered
      sellers under ${cite('ioss_dir_2017_2455')}. Some member states layer additional national fees on top.
    </p>
  </div>`;
  h += `<div class="modal-section">
    <h3>Which regime applies to each item?</h3>
    <div class="regime-cards">
      <div class="regime-card e3">
        <div class="regime-name">€3 / item</div>
        <div class="regime-desc">B2C · ≤ €150 · non-FTA origin. Flat simplified duty per line item.</div>
        <div class="regime-citation">${cite('da_c_2026_2760', 'DA C(2026)2760')}</div>
      </div>
      <div class="regime-card fta">
        <div class="regime-name">FTA €0</div>
        <div class="regime-desc">Origin country has EU FTA + valid proof (REX, EUR.1, etc.) → zero duty.</div>
        <div class="regime-citation">${cite('da_c_2026_2760', 'DA Art. 1(1)(a)')}</div>
      </div>
      <div class="regime-card std">
        <div class="regime-name">Standard tariff</div>
        <div class="regime-desc">Value > €150, or €3 overridden. Full MFN or FTA ad-valorem rate applies.</div>
        <div class="regime-citation">${cite('ucc_952_2013', 'UCC 952/2013')}</div>
      </div>
      <div class="regime-card b2b">
        <div class="regime-name">B2B / CP42</div>
        <div class="regime-desc">Business buyer → full customs procedures, no IOSS, standard tariff.</div>
        <div class="regime-citation">${cite('cp42_da', 'DA Art. 143(1)(d)')}</div>
      </div>
      <div class="regime-card postal">
        <div class="regime-name">H6 postal</div>
        <div class="regime-desc">Non-IOSS postal consignment ≤ €1 000: simplified H6 declaration.</div>
        <div class="regime-citation">${cite('da_2015_2446', 'DA 2015/2446')}</div>
      </div>
    </div>
  </div>`;
  h += `<div class="modal-section">
    <h3>National fees (as of May 2026)</h3>
    <table class="fees-table">
      <thead><tr><th>Country</th><th>Amount</th><th>Basis</th><th>Status</th><th>Legal source</th></tr></thead>
      <tbody>
        <tr>
          <td>France</td><td><strong>€2.00</strong></td><td>per HS6 line</td>
          <td><span class="active-badge">Active from Mar 2026</span></td>
          <td>${cite('fr_ldf_2026', 'LdF 2026, Art. 82')}</td>
        </tr>
        <tr>
          <td>Italy</td><td><strong>€2.00</strong></td><td>per parcel</td>
          <td><span class="suspended-badge">Suspended → 1 Jul 2026</span></td>
          <td>${cite('it_budget_2026', 'Budget Law 2026 §126')}</td>
        </tr>
        <tr>
          <td>Romania</td><td><strong>€4.90</strong></td><td>per parcel</td>
          <td><span class="active-badge">Active from Jan 2026</span></td>
          <td>${cite('ro_og_2025', 'RO Fiscal Pkg Nov 2025')}</td>
        </tr>
      </tbody>
    </table>
    <p style="font-size:11px;color:#6b7280;margin:8px 0 0">
      National fees are excluded from the VAT base per each respective law. Other member states may introduce fees later.
    </p>
  </div>`;
  h += `<div class="modal-section">
    <h3>VAT routing</h3>
    <p style="font-size:12px;line-height:1.7;color:#374151;margin:0">
      <strong>IOSS-registered seller:</strong> VAT collected at checkout, remitted monthly via the IOSS portal. No VAT collected at import. ${cite('ioss_dir_2017_2455')}<br>
      <strong>Non-IOSS B2C (express):</strong> Customs/broker collects import VAT on behalf of buyer. ${cite('reg_2026_382')}<br>
      <strong>Non-IOSS postal:</strong> Designated postal operator uses Special Arrangements scheme. ${cite('reg_2026_382')}<br>
      <strong>B2B:</strong> Reverse-charge applies at destination; no IOSS. Full customs entry required. ${cite('dir_2006_112')}
    </p>
  </div>`;
  h += `<div class="modal-section">
    <h3>Primary sources</h3>
    <div class="reference-grid" id="ref-grid"></div>
  </div>`;
  return h;
}
function populateReferenceGrid() {
  const grid = document.getElementById('ref-grid');
  if (!grid) return;
  grid.innerHTML = Object.entries(CITATIONS).map(([, c]) => `
    <div class="reference-card">
      <div class="ref-short">${c.short}</div>
      <div class="ref-full">${c.full}</div>
      <a href="${c.url}" target="_blank" rel="noopener">Open source ↗</a>
    </div>`).join('');
}

// ============================================================
// Helpers
// ============================================================
const $ = id => document.getElementById(id);
const fmt = n => '€' + Number(n || 0).toFixed(2);
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function regimeClass(regime) {
  if (!regime) return 'std';
  if (regime.startsWith('e3')) return 'e3';
  if (regime.includes('fta')) return 'fta';
  if (regime === 'no_duty') return 'no_duty';
  return 'std';
}
function regimeBadgeText(regime) {
  return ({
    'e3_simplified':         '€3 simplified',
    'standard_tariff':       'Standard tariff',
    'standard_tariff_fta':   'Standard tariff (FTA)',
    'no_duty':               'No duty',
  })[regime] || regime;
}
function heroSubtitle(d) {
  // Pick a representative regime for the subtitle pill from item_breakdown.
  const regimes = (d.item_breakdown || []).map(i => i.regime);
  const uniq = [...new Set(regimes)];
  if (uniq.length === 1) return regimeBadgeText(uniq[0]);
  return regimes.length + ' lines · mixed regimes';
}

// ============================================================
// Renderers
// ============================================================
function renderSummaryStrip(payload) {
  const from = payload.addresses.shipFrom.country;
  const to   = payload.addresses.shipTo.country;
  const date = payload.date;
  const channel = payload.euReform2026.shipmentChannel;
  const ioss = !!payload.euReform2026.iossNumber;
  const b2b  = !!payload.customer.euReform2026.isBusinessBuyer;
  const buyerAgent = !!payload.euReform2026.buyerAgent;

  const tags = [
    `<span class="tag"><strong>${from} → ${to}</strong></span>`,
    `<span class="tag">${date}</span>`,
    `<span class="tag">channel: ${channel}</span>`,
    `<span class="tag ${ioss ? 'ioss-yes' : 'ioss-no'}">IOSS: ${ioss ? 'yes' : 'no'}</span>`,
    `<span class="tag ${b2b ? 'b2b-yes' : ''}">B2B: ${b2b ? 'yes' : 'no'}</span>`,
  ];
  if (buyerAgent) tags.push(`<span class="tag">buyer agent</span>`);
  $('summary-strip').innerHTML = tags.join('');
}

function renderHero(d) {
  $('hero').innerHTML = `
    <div class="hero-label">Total landed cost (EUR)</div>
    <div class="hero-amount">${fmt(d.landed_cost_eur)}</div>
    <div class="hero-sub">
      Regime applied <span class="pill">${heroSubtitle(d)}</span>
      <span class="pill">Decl: ${d.declaration_type}</span>
      <span class="pill">Declarant: ${d.declarant}</span>
    </div>
  `;
}

function renderCostGrid(d) {
  const fees = d.fees || {};
  const feesTotal = Number(fees.union_handling_fee_eur || 0) + Number(fees.national_fee_eur || 0);
  const feeNote = [];
  if (Number(fees.union_handling_fee_eur || 0) > 0) feeNote.push('union handling');
  if (Number(fees.national_fee_eur || 0) > 0) feeNote.push('national');
  $('cost-grid').innerHTML = `
    <div class="cost-card">
      <div class="lbl">Goods value</div>
      <div class="val">${fmt(d.consignment_value_eur)}</div>
    </div>
    <div class="cost-card">
      <div class="lbl">Customs duty</div>
      <div class="val">${fmt(d.duty_total_eur)}</div>
    </div>
    <div class="cost-card">
      <div class="lbl">VAT</div>
      <div class="val">${fmt(d.vat.vat_eur)}</div>
      <div class="note">${(d.vat.vat_rate*100).toFixed(1)}% on ${fmt(d.vat.vat_base_eur)} · ${escHtml(d.vat.collected_via)}</div>
    </div>
    <div class="cost-card">
      <div class="lbl">Fees</div>
      <div class="val">${fmt(feesTotal)}</div>
      <div class="note">${feeNote.length ? feeNote.join(' + ') : 'none'}</div>
    </div>
    <div class="cost-card">
      <div class="lbl">Shipping</div>
      <div class="val">${fmt(d.shipping_cost_eur)}</div>
      <div class="note">modeled small-parcel rate</div>
    </div>
  `;
}

function renderLinesTable(payload, d) {
  // Map payload lines to per-line rows; pair with item_breakdown by index when possible.
  const lines = payload.lines || [];
  const breakdowns = d.item_breakdown || [];
  let rows = '<thead><tr>' +
    '<th>HS6</th>' +
    '<th>Description</th>' +
    '<th>Origin</th>' +
    '<th class="num">Qty</th>' +
    '<th class="num">Unit value</th>' +
    '<th class="num">Line value</th>' +
    '<th>Regime</th>' +
    '<th class="num">Duty</th>' +
    '</tr></thead><tbody>';

  lines.forEach((ln, i) => {
    const qty = Number(ln.quantity || 0);
    const lineValue = Number(ln.amount || 0);
    const unit = qty > 0 ? lineValue / qty : 0;
    // Find a matching breakdown by HS6 + origin (grouping_key = [hs6, desc-lower, origin])
    const bd = breakdowns.find(b => b.grouping_key && b.grouping_key[0] === ln.hsCode && b.grouping_key[2] === ln.countryOfOrigin)
            || breakdowns[i] || null;
    const regime = bd ? bd.regime : '';
    const duty   = bd ? bd.duty_eur : 0;
    rows += `<tr>
      <td><code>${escHtml(ln.hsCode || '')}</code></td>
      <td>${escHtml(ln.description || '')}</td>
      <td>${escHtml(ln.countryOfOrigin || '')}</td>
      <td class="num">${qty}</td>
      <td class="num">${fmt(unit)}</td>
      <td class="num">${fmt(lineValue)}</td>
      <td><span class="regime-badge ${regimeClass(regime)}">${escHtml(regimeBadgeText(regime))}</span></td>
      <td class="num">${fmt(duty)}</td>
    </tr>`;
  });
  rows += '</tbody>';
  $('lines-table').innerHTML = rows;
}

// ============================================================
// Strategy analysis — categorised, explained card
// ============================================================
const STRATEGY_LABELS = {
  status_quo:               'Status quo',
  consolidate_descriptions: 'Consolidate descriptions',
  split_parcels:            'Split into separate parcels',
  push_above_150:           'Push value above €150',
  drop_ioss_use_fta:        'Drop IOSS, use postal + FTA',
  b2b_eu_warehouse:         'Bulk B2B + EU warehouse fulfilment',
};
function strategyLabel(name) {
  if (STRATEGY_LABELS[name]) return STRATEGY_LABELS[name];
  return String(name || '')
    .replace(/_/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

// Bucket assignments — which category each strategy belongs to.
const STRATEGY_BUCKETS = {
  consolidate_descriptions: 'operational',
  drop_ioss_use_fta:        'operational',
  split_parcels:            'counter',
  push_above_150:           'counter',
  b2b_eu_warehouse:         'pivot',
};
const BUCKET_META = {
  operational: { icon: '🛠', title: 'Operational fixes' },
  counter:     { icon: '📊', title: 'Counter-examples' },
  pivot:       { icon: '🏗', title: 'Strategic pivots' },
};

// Plain-language explanations per strategy.
const STRATEGY_EXPLANATIONS = {
  consolidate_descriptions: {
    what: 'Normalise descriptions of items sharing HS6+origin so they collapse to one grouping.',
    why_help: 'Reduces per-HS6 fee count (matters for FR €2/HS6 stacking).',
    why_na: 'No items share HS6+origin with different descriptions — nothing to consolidate.',
  },
  drop_ioss_use_fta: {
    what: 'Drop IOSS at checkout; ship via postal designated operator with FTA preference.',
    why_help: 'The €3 simplified fee is bypassed; standard tariff applies (often 0% under FTA). Postal lane is also cheaper to ship (€5 vs €15 express).',
    why_filtered: 'No items qualify — origin not in EU FTA partner list, or FTA proof not held.',
  },
  split_parcels: {
    what: 'Ship each HS6+origin grouping as a separate parcel instead of 1 consolidated.',
    why_worse: 'Per-parcel fees apply N times (e.g. IT €2/parcel, RO €4.90/parcel), AND shipping is paid per parcel (€15 × N).',
    why_na: 'Only one HS6+origin grouping in this shipment — nothing to split.',
  },
  push_above_150: {
    what: 'Bump consignment value to €150.01 (filler item or upsell).',
    why_worse_under_threshold: 'VAT base jumps to €150.01 (×3+); standard tariff replaces €3 simplified.',
    caveat: 'Requires merchandising change.',
    why_na: 'Already above €150 — strategy not applicable.',
  },
  b2b_eu_warehouse: {
    what: 'Order in bulk (≥€1000) as B2B; fulfil EU customers from an EU warehouse.',
    why_na: 'Requires bulk B2B (€1000+ floor), EU warehouse capacity, working capital — not a per-shipment fix. Shipping switches to consolidated freight (€50 flat) instead of per-parcel express.',
  },
};

// Build the "modified input" line for each strategy from the payload.
function modifiedInputFor(name, payload) {
  const lines = (payload && payload.lines) || [];
  const totalValue = lines.reduce((a, l) => a + Number(l.amount || 0), 0);
  switch (name) {
    case 'consolidate_descriptions':
      return 'Description normalisation: items sharing HS6+origin get a unified description.';
    case 'drop_ioss_use_fta':
      return 'Channel: express → postal · IOSS: yes → no · FTA proof applied.';
    case 'split_parcels': {
      const groupings = new Set(lines.map(l => `${l.hsCode}|${l.countryOfOrigin}`));
      const n = Math.max(groupings.size, 1);
      return `Parcels: 1 → ${n} (one per HS6+origin grouping).`;
    }
    case 'push_above_150':
      return `Consignment value: ${fmt(totalValue)} → €150.01.`;
    case 'b2b_eu_warehouse': {
      const target = Math.max(totalValue, 1000);
      return `Buyer: B2C → B2B · Value: ${fmt(totalValue)} → ${fmt(target)} · IOSS: yes → no.`;
    }
    default:
      return '';
  }
}

// Detect applicability based on the payload context, independent of cost.
function strategyApplicability(name, payload) {
  const lines = (payload && payload.lines) || [];
  const totalValue = lines.reduce((a, l) => a + Number(l.amount || 0), 0);
  switch (name) {
    case 'consolidate_descriptions': {
      // Applicable iff the (HS6, desc, origin) key set has more entries than (HS6, origin).
      // i.e. at least two items share HS6+origin but differ on description.
      const fullKeys  = new Set(lines.map(l => `${l.hsCode}|${(l.description||'').trim().toLowerCase()}|${l.countryOfOrigin}`));
      const groupKeys = new Set(lines.map(l => `${l.hsCode}|${l.countryOfOrigin}`));
      return fullKeys.size > groupKeys.size;
    }
    case 'split_parcels': {
      const groupings = new Set(lines.map(l => `${l.hsCode}|${l.countryOfOrigin}`));
      return groupings.size >= 2;
    }
    case 'push_above_150':
      return totalValue < 150;
    case 'b2b_eu_warehouse':
      // Strategic pivot — never per-shipment applicable.
      return false;
    case 'drop_ioss_use_fta':
      // Only resolvable from presence in strategies array (see classifyStrategy).
      return true;
    default:
      return true;
  }
}

// Classify a strategy result into one of: saves | worse | noop | na_inapplicable.
function classifyStrategy(s, statusQuoCost, payload) {
  if (!s) return 'na_inapplicable';
  if (s.name === 'b2b_eu_warehouse') return 'na_inapplicable';
  const applicable = strategyApplicability(s.name, payload);
  if (!applicable) return 'na_inapplicable';
  const cost = Number(s.result && s.result.landed_cost_eur || 0);
  const sq   = Number(statusQuoCost || 0);
  const delta = cost - sq;          // positive = worse
  if (-delta >= 0.50) return 'saves';
  if ( delta >= 1.00) return 'worse';
  return 'noop';
}

const STATE_ICONS = {
  saves: '✅',
  worse: '⚠️',
  noop:  '➖',
  na_inapplicable: '🚫',
};

function renderStrategies(strategies, payload) {
  const host = $('strategies');
  if (!host) return;
  if (!Array.isArray(strategies)) strategies = [];

  const statusQuo = strategies.find(s => s.name === 'status_quo');
  const sqCost = statusQuo ? Number(statusQuo.result.landed_cost_eur || 0) : 0;

  // Build a working list of strategy-name → { entry, classification }.
  // For drop_ioss_use_fta: if it's in the strategies array, classify by cost.
  // If missing from the array (backend filtered it out), synthesize a "filtered" N/A row.
  const ALL_NAMES = ['consolidate_descriptions','drop_ioss_use_fta','split_parcels','push_above_150','b2b_eu_warehouse'];
  const byName = Object.fromEntries(strategies.map(s => [s.name, s]));

  const rows = ALL_NAMES.map(name => {
    const entry = byName[name];
    let state, cost = null, delta = null, filteredByBackend = false;

    if (!entry) {
      // Strategy is missing from the backend response.
      // For drop_ioss_use_fta this means the FTA filter excluded it → render as N/A.
      // For push_above_150 this means the value was already above €150 → also N/A.
      // For others it shouldn't normally happen, but treat as N/A.
      state = 'na_inapplicable';
      filteredByBackend = true;
    } else {
      state = classifyStrategy(entry, sqCost, payload);
      cost = Number(entry.result && entry.result.landed_cost_eur || 0);
      delta = cost - sqCost;
    }
    return { name, entry, state, cost, delta, filteredByBackend };
  });

  // Tally summary chips.
  const counts = { saves: 0, worse: 0, noop: 0, na: 0 };
  rows.forEach(r => {
    if (r.state === 'saves') counts.saves++;
    else if (r.state === 'worse') counts.worse++;
    else if (r.state === 'noop') counts.noop++;
    else counts.na++;
  });
  const totalEvaluated = rows.length;

  // Group rows by bucket.
  const buckets = { operational: [], counter: [], pivot: [] };
  rows.forEach(r => {
    const b = STRATEGY_BUCKETS[r.name] || 'operational';
    buckets[b].push(r);
  });

  function explanationFor(r) {
    const exp = STRATEGY_EXPLANATIONS[r.name] || {};
    const parts = [];
    if (exp.what) parts.push(`<span class="lbl">What:</span> ${escHtml(exp.what)}`);
    if (r.state === 'saves' && exp.why_help) {
      parts.push(`<span class="lbl">Why it helps:</span> ${escHtml(exp.why_help)}`);
    } else if (r.state === 'worse') {
      const why = exp.why_worse || exp.why_worse_under_threshold;
      if (why) parts.push(`<span class="lbl">Why worse:</span> ${escHtml(why)}`);
      if (exp.caveat) parts.push(`<span class="lbl">Caveat:</span> ${escHtml(exp.caveat)}`);
    } else if (r.state === 'noop') {
      parts.push(`<span class="lbl">Result:</span> Same cost as status quo (within €0.50). Strategy ran but didn't move the needle.`);
    } else if (r.state === 'na_inapplicable') {
      let reason = exp.why_na || 'Strategy does not apply to this shipment.';
      if (r.name === 'drop_ioss_use_fta' && r.filteredByBackend) {
        reason = exp.why_filtered || reason;
      } else if (r.name === 'push_above_150' && r.filteredByBackend) {
        reason = exp.why_na || 'Already above €150 — strategy not applicable.';
      }
      parts.push(`<span class="lbl">Why N/A:</span> ${escHtml(reason)}`);
    }
    const cls = (r.state === 'na_inapplicable') ? 'strategy-explain na' : 'strategy-explain';
    return `<div class="${cls}">${parts.join(' ')}</div>`;
  }

  function rowHtml(r) {
    const stateClass = r.state === 'na_inapplicable' ? 'na' : r.state;
    const icon = STATE_ICONS[r.state] || '·';
    const label = strategyLabel(r.name);

    let resultHtml;
    if (r.state === 'na_inapplicable') {
      resultHtml = `<div class="strategy-result na">N/A</div>`;
    } else {
      const deltaSign = r.delta > 0 ? '+' : (r.delta < 0 ? '−' : '±');
      const deltaAbs  = fmt(Math.abs(r.delta));
      const deltaCls  = r.state;
      resultHtml = `<div class="strategy-result">${fmt(r.cost)}<span class="strategy-delta ${deltaCls}"> (${deltaSign}${deltaAbs.replace('€','')}€)</span></div>`;
    }

    // Modified-input line — show only for applicable rows (state !== na) OR for push_above_150 N/A
    // because the user wants to see what the modification would be even when not applicable.
    const showModified = r.state !== 'na_inapplicable' || (r.name === 'push_above_150' && !r.filteredByBackend);
    const modifiedHtml = showModified
      ? `<div class="strategy-modified"><span class="lbl">Modified:</span> ${escHtml(modifiedInputFor(r.name, payload))}</div>`
      : '';

    return `<div class="strategy-row ${stateClass}">
      <div class="strategy-icon">${icon}</div>
      <div class="strategy-label">${escHtml(label)}</div>
      ${resultHtml}
      ${modifiedHtml}
      ${explanationFor(r)}
    </div>`;
  }

  function bucketHtml(key) {
    const meta = BUCKET_META[key];
    const items = buckets[key];
    const total = items.length;
    const applicable = items.filter(r => r.state !== 'na_inapplicable').length;
    const worse = items.filter(r => r.state === 'worse').length;
    const saves = items.filter(r => r.state === 'saves').length;
    let metaText;
    if (key === 'pivot') {
      metaText = '(out of scope per-shipment)';
    } else {
      const bits = [`${applicable} of ${total} applicable`];
      if (saves) bits.push(`${saves} save`);
      if (worse) bits.push(`${worse} worse`);
      metaText = `(${bits.join(', ')})`;
    }
    const body = items.length
      ? items.map(rowHtml).join('')
      : '<div class="strategy-bucket-empty">(none for this configuration)</div>';
    return `<div class="strategy-bucket">
      <h3>${meta.icon} ${escHtml(meta.title)} <span class="strategy-bucket-meta">${escHtml(metaText)}</span></h3>
      ${body}
    </div>`;
  }

  const summaryChips = [
    `<span class="strategy-summary-chip">${totalEvaluated} evaluated</span>`,
    `<span class="strategy-summary-chip saves">✅ ${counts.saves} save${counts.saves === 1 ? '' : 's'}</span>`,
    `<span class="strategy-summary-chip worse">⚠️ ${counts.worse} worse</span>`,
    `<span class="strategy-summary-chip na">🚫 ${counts.na} N/A</span>`,
  ];
  if (counts.noop) {
    summaryChips.splice(3, 0, `<span class="strategy-summary-chip">➖ ${counts.noop} no-op</span>`);
  }

  host.innerHTML = `
    <h2>🧠 Strategy analysis</h2>
    <div class="strategy-card-summary">${summaryChips.join('')}</div>
    <div class="strategy-baseline">
      <span class="strategy-baseline-label">Status quo (current configuration)</span>
      <span class="strategy-baseline-value">${fmt(sqCost)}</span>
    </div>
    ${bucketHtml('operational')}
    ${bucketHtml('counter')}
    ${bucketHtml('pivot')}
  `;
}

// renderWork — adapted from index.html, with section 7 (Avalara baseline) removed.
function renderWork(d, payload) {
  let html = '';

  // 1. Inputs
  html += '<h3>1. Inputs received</h3>';
  html += `<div class="step input">
    <span class="label">Route:</span> ${escHtml(payload.addresses.shipFrom.country)} → ${escHtml(payload.addresses.shipTo.country)} ·
    <span class="label">Date:</span> ${escHtml(payload.date)} ·
    <span class="label">Channel:</span> ${escHtml(payload.euReform2026.shipmentChannel)}<br>
    <span class="label">B2B:</span> ${payload.customer.euReform2026.isBusinessBuyer} ·
    <span class="label">IOSS:</span> ${payload.euReform2026.iossNumber ? 'yes' : 'no'} ·
    <span class="label">Buyer agent:</span> ${payload.euReform2026.buyerAgent}
  </div>`;

  // 2. Defaults applied
  if (d.defaults_applied && d.defaults_applied.length > 0) {
    html += '<h3>2. Defaults applied (caller omitted)</h3>';
    d.defaults_applied.forEach(def => {
      html += `<div class="default-item"><span class="field">${escHtml(def.field)}</span> = <code>${escHtml(JSON.stringify(def.default))}</code><br>${escHtml(def.rationale)}</div>`;
    });
  } else {
    html += '<h3>2. Defaults applied</h3><div class="step calc">None — caller supplied all fields.</div>';
  }

  // 3. Decision tree per item
  html += '<h3>3. Regime decision per item</h3>';
  (d.item_breakdown || []).forEach(item => {
    html += `<div class="item-breakdown">
      <div class="line-key">${item.grouping_key.map(escHtml).join(' / ')}</div>
      <div>Qty ${item.qty_total} · Line value ${fmt(item.line_value_eur)}</div>
      <span class="regime-badge ${regimeClass(item.regime)}">${escHtml(regimeBadgeText(item.regime))}</span>
      <strong style="float:right">${fmt(item.duty_eur)}</strong>
      ${item.notes && item.notes.length ? '<div style="font-size:11px;color:#6b7280;margin-top:4px">' + item.notes.map(escHtml).join('<br>') + '</div>' : ''}
    </div>`;
  });

  // 4. VAT routing
  html += '<h3>4. VAT routing</h3>';
  html += `<div class="step calc">
    <span class="label">Base:</span> ${fmt(d.vat.vat_base_eur)} ×
    <span class="label">Rate:</span> ${(d.vat.vat_rate*100).toFixed(1)}% =
    <span class="label">${fmt(d.vat.vat_eur)}</span><br>
    <span class="label">Collected via:</span> <code>${escHtml(d.vat.collected_via)}</code>
  </div>`;

  // 5. Fees
  if (Number(d.fees.national_fee_eur) > 0 || Number(d.fees.union_handling_fee_eur) > 0) {
    html += '<h3>5. Fees</h3>';
    if (Number(d.fees.union_handling_fee_eur) > 0) {
      html += `<div class="step calc"><span class="label">Union handling:</span> ${fmt(d.fees.union_handling_fee_eur)}<br><small>EU-wide flat fee, effective 1 Nov 2026 (Reg. 2026/382, working assumption pending implementing act)</small></div>`;
    }
    if (Number(d.fees.national_fee_eur) > 0) {
      const feeKey = FEE_REF_MAP[payload.addresses.shipTo.country];
      const feeSrcText = d.fees.national_fee_source || 'national fee';
      const feeSrcHtml = feeKey ? cite(feeKey, feeSrcText) : escHtml(feeSrcText);
      html += `<div class="step calc"><span class="label">National (${escHtml(payload.addresses.shipTo.country)}):</span> ${fmt(d.fees.national_fee_eur)}<br><small>${feeSrcHtml}</small></div>`;
    }
  }

  // 6. Shipping (modeled)
  if (Number(d.shipping_cost_eur) > 0) {
    html += '<h3>6. Shipping (modeled)</h3>';
    html += `<div class="step calc">
      <span class="label">Per-parcel shipping:</span> ${fmt(d.shipping_cost_eur)}<br>
      <small>Indicative small-parcel rate by channel (express €15 · postal €5 · general cargo €50). Not a live rate quote — used so landed-cost comparisons across strategies reflect the channel change.</small>
    </div>`;
  }

  // 7. Final result
  html += '<h3>7. Final result</h3>';
  const feesTotal = Number(d.fees.union_handling_fee_eur || 0) + Number(d.fees.national_fee_eur || 0);
  html += `<div class="step result">
    <span class="label">Duty:</span> ${fmt(d.duty_total_eur)} ·
    <span class="label">VAT:</span> ${fmt(d.vat.vat_eur)} ·
    <span class="label">Fees:</span> ${fmt(feesTotal)} ·
    <span class="label">Shipping:</span> ${fmt(d.shipping_cost_eur)}<br>
    <span class="label">Landed:</span> ${fmt(d.landed_cost_eur)}
  </div>`;

  // (Section 7 — engine-vs-baseline comparison — intentionally omitted in demo.)

  // National-fee status line if applicable (mirrors index renderTotals)
  if (Number(d.fees.national_fee_eur) > 0) {
    const ms = payload.addresses.shipTo.country;
    const feeKey = FEE_REF_MAP[ms];
    const feeSrcText = d.fees.national_fee_source || 'national fee';
    const feeSrcHtml = feeKey ? cite(feeKey, feeSrcText) : escHtml(feeSrcText);
    html += `<div class="fee-status"><span class="indicator">⚠ National fee active:</span> ${feeSrcHtml}</div>`;
  }

  // Compliance warnings
  if (d.compliance_warnings && d.compliance_warnings.length) {
    html += '<h3>Compliance warnings</h3>';
    d.compliance_warnings.forEach(w => { html += `<div class="warning">${escHtml(w)}</div>`; });
  }

  // Legal references — wired to citation registry (LEGAL_REF_MAP keys are substrings).
  if (d.legal_references && d.legal_references.length) {
    html += '<h3>Legal references</h3><ul class="ref-list">';
    d.legal_references.forEach(r => {
      const citKey = Object.keys(LEGAL_REF_MAP).find(k => r.includes(k));
      html += `<li>${citKey ? cite(LEGAL_REF_MAP[citKey], r) : escHtml(r)}</li>`;
    });
    html += '</ul>';
  }

  $('work').innerHTML = html;
}

// ============================================================
// Sidebar wiring + scenario selection
// ============================================================
function buildSidebar() {
  const wrap = $('scenario-list');
  wrap.innerHTML = SCENARIOS.map(s => `
    <button type="button" class="scenario-item" data-id="${s.id}">
      <span class="label">${s.label}</span>
      <span class="desc">${escHtml(s.desc)}</span>
    </button>
  `).join('');
  wrap.querySelectorAll('.scenario-item').forEach(btn => {
    btn.addEventListener('click', () => selectScenario(btn.dataset.id));
  });
}

function renderScenarioHeader(id) {
  const meta = SCENARIOS.find(s => s.id === id);
  const host = $('scenario-header');
  if (!host) return;
  if (!meta) { host.innerHTML = ''; return; }
  host.innerHTML = `
    <div class="sh-label">Scenario</div>
    <div class="sh-title">${escHtml(meta.label || '')}</div>
    <div class="sh-desc">${escHtml(meta.desc || '')}</div>
  `;
}

function selectScenario(id) {
  const entry = SCENARIO_DATA[id];
  if (!entry) return;
  document.querySelectorAll('.scenario-item').forEach(b => {
    b.classList.toggle('active', b.dataset.id === id);
  });
  renderScenarioHeader(id);
  renderSummaryStrip(entry.payload);
  renderHero(entry.response);
  renderCostGrid(entry.response);
  renderLinesTable(entry.payload, entry.response);
  renderWork(entry.response, entry.payload);
  renderStrategies(entry.strategies, entry.payload);
  // Scroll detail back to top so screenshot framing stays consistent
  $('detail').scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ============================================================
// Init: render the FIRST scenario (gb_fta) on page load.
// ============================================================
buildSidebar();
selectScenario(SCENARIOS[0].id);
</script>
