services:
  - type: web
    name: eu-inbound-calc
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: FLASK_DEBUG
        value: "0"
      - key: AVALARA_API_BASE
        value: https://quoting-int.xbo.avalara.com/api/v2
      - key: AVALARA_TOKEN
        sync: false
      - key: AVALARA_COMPANY_ID
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
